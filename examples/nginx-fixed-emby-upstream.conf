# Put this inside the HTTPS server block, before the generic "location /".
# Example:
#   public entry:  https://emby.example.com/movie/
#   upstream:      https://movie.example.com

location = /movie {
    return 301 /movie/;
}

location ^~ /movie/emby/videos/ {
    rewrite ^/movie/(.*)$ /$1 break;

    proxy_pass https://movie.example.com;
    proxy_ssl_server_name on;
    proxy_ssl_name movie.example.com;

    proxy_http_version 1.1;
    proxy_set_header Host movie.example.com;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $emby_connection_upgrade;

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
}

location ^~ /movie/ {
    rewrite ^/movie/(.*)$ /$1 break;

    proxy_pass https://movie.example.com;
    proxy_ssl_server_name on;
    proxy_ssl_name movie.example.com;

    proxy_http_version 1.1;
    proxy_set_header Host movie.example.com;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $emby_connection_upgrade;
    proxy_set_header Accept-Encoding "";

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;

    proxy_redirect https://movie.example.com/ /movie/;
    proxy_redirect http://movie.example.com/ /movie/;

    sub_filter 'https://movie.example.com' 'https://emby.example.com/movie';
    sub_filter 'http://movie.example.com' 'https://emby.example.com/movie';
    sub_filter_once off;
    sub_filter_types text/html application/json text/plain application/javascript text/javascript;
}
